<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
    <meta charset="UTF-8">
    <title>אתגר פיתגורס המורחב</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #87CEEB;
            text-align: center;
            margin: 0;
            padding: 0;
        }

        .page-container {
            max-width: 800px;
            margin: 40px auto;
            border-radius: 15px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.4);
            overflow: hidden;
            display: none;
        }

        #block-game { background-color: #8B4513; color: white; border: 4px solid #556B2F; }
        #quiz-game { background-color: #4682B4; color: white; border: 4px solid #F0E68C; }
        #main-menu, #shop { background-color: #F0E68C; color: #333; border: 4px solid #CD853F; display: block; padding: 40px; }
        #main-menu h1, #shop h1 { color: #556B2F; text-shadow: none; }
        h1 { color: #7CFC00; text-shadow: 2px 2px 4px #000000; margin-top: 0; padding-top: 20px; }
        
        .game-content { padding: 30px; }

        button {
            background-color: #556B2F; color: white; border: none; padding: 12px 24px;
            font-size: 18px; cursor: pointer; border-radius: 5px; margin: 10px;
            transition: background-color 0.3s, transform 0.1s;
        }
        button:hover { background-color: #6B8E23; }
        button:active { transform: scale(0.97); }

        .back-btn { background-color: #CD853F; position: absolute; top: 20px; right: 20px; margin: 0; }
        .back-btn:hover { background-color: #D2691E; }

        .problem-box { background-color: rgba(255, 255, 255, 0.1); padding: 20px; border-radius: 8px; margin: 20px 0; font-size: 20px; border: 2px dashed #CD853F; }
        input[type="number"] { padding: 10px; font-size: 18px; width: 100px; text-align: center; border-radius: 5px; border: 2px solid #556B2F; margin-top: 10px; }

        #feedback, #quiz-feedback { font-size: 22px; font-weight: bold; margin-top: 20px; min-height: 40px; }
        #score-board, #coin-board { font-size: 18px; margin-top: 20px; background-color: rgba(0, 0, 0, 0.2); padding: 10px; border-radius: 5px; }

        .quiz-question { font-size: 24px; margin-bottom: 25px; background-color: rgba(255,255,255,0.1); padding: 15px; border-radius: 8px; }
        .options-container { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        .option-btn { background-color: #F0E68C; color: #333; font-size: 20px; padding: 20px; border: 3px solid #CD853F; border-radius: 10px; margin: 0; }
        .option-btn:hover { background-color: #FFFACD; transform: scale(1.03); }

        /* סגנון לאימוג'י הפידבק בחידון (במקום בובספוג) */
        #emoji-feedback { font-size: 80px; margin-top: 15px; display: none; }
        
        .coin-display { font-size: 22px; font-weight: bold; background-color: rgba(0, 0, 0, 0.1); padding: 10px; border-radius: 5px; color: #556B2F; }

        #shop-items { display: flex; justify-content: center; flex-wrap: wrap; gap: 20px; margin-top: 20px; }
        .shop-item { border: 3px solid #CD853F; background-color: #FFFACD; border-radius: 10px; padding: 15px; width: 200px; text-align: center; }
        
        /* סגנון לאימוג'ים בחנות במקום תמונות */
        .shop-emoji { font-size: 70px; margin: 10px 0; text-shadow: 2px 2px 4px rgba(0,0,0,0.2); }
        
        .owned-badge { color: #6B8E23; font-weight: bold; margin-top: 10px; font-size: 20px; }
    </style>
</head>
<body>

    <div id="main-menu" class="page-container">
        <h1>ברוכים הבאים לעולם של פיתגורס!</h1>
        <p>בחר את האתגר שלך:</p>
        <button onclick="startGame('block')">🧱 אתגר הבלוקים</button>
        <button onclick="startGame('quiz')">❓ חידון פיתגורס</button>
        <br><br>
        <button onclick="openShop()" style="background-color: #CD853F;">🏬 חנות המתמטיקאים</button>
        
        <div class="coin-display" style="margin-top: 20px;">
            צברת: <span id="menu-coin-count">0</span> 🪙
        </div>
    </div>

    <div id="shop" class="page-container" style="position: relative;">
        <button class="back-btn" onclick="backToMenu()">חזור לתפריט</button>
        <h1>חנות המתמטיקאים הגדולים</h1>
        <div class="coin-display">
            יש לך: <span id="shop-coin-count">0</span> 🪙
        </div>
        <div id="shop-items"></div>
    </div>

    <div id="block-game" class="page-container" style="position: relative;">
        <button class="back-btn" onclick="backToMenu()">חזור לתפריט</button>
        <h1>אתגר הבלוקים של פיתגורס!</h1>
        <div class="game-content">
            <p>כדי לעבור לצד השני, אתה צריך לבנות גשר אלכסוני מבלוקים.</p>
            <div class="problem-box">
                <p id="question">טוען נתונים...</p>
                <input type="number" id="answer" placeholder="כמה בלוקים?">
                <br>
                <button onclick="checkAnswer()">בנה את הגשר</button>
            </div>
            <div id="feedback"></div>
            <div id="score-board">
                גשרים שנבנו בהצלחה: <span id="score">0</span>
            </div>
        </div>
    </div>

    <div id="quiz-game" class="page-container" style="position: relative;">
        <button class="back-btn" onclick="backToMenu()">חזור לתפריט</button>
        <h1 style="color: #F0E68C;">חידון פיתגורס</h1>
        <div class="game-content">
            <div class="quiz-question" id="quiz-question-text">טוען שאלה...</div>
            <div class="options-container" id="options-container"></div>
            <div id="quiz-feedback"></div>
            <div id="emoji-feedback"></div>
            <div id="coin-board">
                מטבעות שצברת: <span id="quiz-coin-count">0</span> 🪙
            </div>
        </div>
    </div>

    <script>
        let currentMode = 'menu';
        let blockScore = 0;
        let coins = 0;
        
        const pythagoreanTriples = [
            [3, 4, 5], [5, 12, 13], [6, 8, 10], [8, 15, 17], [9, 12, 15], [12, 16, 20]
        ];
        let currentHypotenuse = 0;

        const quizQuestions = [
            {
                question: "מה אומר משפט פיתגורס?",
                options: ["הסכום של שתי צלעות שווה לצלע השלישית", "סכום הזוויות הוא 180 מעלות", "סכום ריבועי הניצבים שווה לריבוע היתר", "משמש למציאת שטח של עיגול"],
                correctIndex: 2
            },
            {
                question: "מי המציא את משפט פיתגורס?",
                options: ["נקרא על שמו, אבל הכירו אותו קודם", "המצרים העתיקים", "בובספוג", "לאונרד אוילר"],
                correctIndex: 0
            },
            {
                question: "באיזה סוג משולש משתמשים במשפט?",
                options: ["משולש שווה שוקיים", "משולש ישר זווית", "כל סוג של משולש", "משולש קהה זווית"],
                correctIndex: 1
            },
            {
                question: "מהו היתר במשולש ישר זווית?",
                options: ["הצלע הקצרה ביותר", "הצלע שיוצרת את הזווית הישרה", "הצלע מול הזווית הישרה והארוכה ביותר", "זווית של 90 מעלות"],
                correctIndex: 2
            }
        ];
        let currentQuizIndex = 0;

        // נתוני החנות מעודכנים עם אימוג'ים מגניבים במקום תמונות שבורות
        const shopItemsData = [
            { id: 1, name: "פיתגורס", price: 3, emoji: "📐🧔🏽‍♂️" },
            { id: 2, name: "אוקלידס", price: 5, emoji: "📖👴🏻" },
            { id: 3, name: "ארכימדס", price: 8, emoji: "🛁💡" }
        ];
        let ownedItems = [];

        function startGame(mode) {
            hideAllPages();
            if (mode === 'block') {
                document.getElementById('block-game').style.display = 'block';
                generateBlockProblem();
            } else if (mode === 'quiz') {
                document.getElementById('quiz-game').style.display = 'block';
                currentQuizIndex = 0;
                displayQuizQuestion();
            }
            updateCoinDisplays();
        }

        function openShop() {
            hideAllPages();
            document.getElementById('shop').style.display = 'block';
            updateCoinDisplays();
            renderShopItems();
        }

        function backToMenu() {
            hideAllPages();
            document.getElementById('main-menu').style.display = 'block';
            updateCoinDisplays();
        }

        function hideAllPages() {
            document.querySelectorAll('.page-container').forEach(page => {
                page.style.display = 'none';
            });
        }

        function updateCoinDisplays() {
            document.getElementById('quiz-coin-count').innerText = coins;
            document.getElementById('shop-coin-count').innerText = coins;
            document.getElementById('menu-coin-count').innerText = coins;
        }

        function generateBlockProblem() {
            const triple = pythagoreanTriples[Math.floor(Math.random() * pythagoreanTriples.length)];
            currentHypotenuse = triple[2];
            document.getElementById('question').innerHTML = `האורך הוא <b>${triple[0]}</b> בלוקים, והרוחב הוא <b>${triple[1]}</b>.<br>מה אורך הגשר (היתר)?`;
            document.getElementById('answer').value = '';
            document.getElementById('feedback').innerHTML = '';
            document.getElementById('answer').focus();
        }

        function checkAnswer() {
            const userAnswer = parseInt(document.getElementById('answer').value);
            const feedbackEl = document.getElementById('feedback');

            if (isNaN(userAnswer)) return;

            if (userAnswer === currentHypotenuse) {
                feedbackEl.innerHTML = "כל הכבוד! בנית את הגשר! 🧱✨";
                feedbackEl.style.color = "#7CFC00";
                blockScore++;
                document.getElementById('score').innerText = blockScore;
                setTimeout(generateBlockProblem, 1500);
            } else {
                feedbackEl.innerHTML = `אופס! נסה שוב ($a^2 + b^2 = c^2$)`;
                feedbackEl.style.color = "#FF6347";
            }
        }

        document.getElementById('answer').addEventListener("keypress", e => { if(e.key === "Enter") checkAnswer(); });

        function displayQuizQuestion() {
            const feedbackEl = document.getElementById('quiz-feedback');
            const emojiEl = document.getElementById('emoji-feedback');
            feedbackEl.innerHTML = '';
            emojiEl.style.display = 'none';

            if (currentQuizIndex >= quizQuestions.length) {
                document.getElementById('quiz-question-text').innerHTML = "סיימת את החידון!";
                document.getElementById('options-container').innerHTML = '';
                feedbackEl.innerHTML = `כל הכבוד! חזור לתפריט כדי לקנות בחנות.`;
                feedbackEl.style.color = "#7CFC00";
                return;
            }

            const currentQ = quizQuestions[currentQuizIndex];
            document.getElementById('quiz-question-text').innerText = currentQ.question;
            const optionsContainer = document.getElementById('options-container');
            optionsContainer.innerHTML = '';
            
            currentQ.options.forEach((option, index) => {
                const btn = document.createElement('button');
                btn.innerText = `${index + 1}. ${option}`;
                btn.className = 'option-btn';
                btn.onclick = () => checkQuizAnswer(index);
                optionsContainer.appendChild(btn);
            });
        }

        function checkQuizAnswer(selectedIndex) {
            const currentQ = quizQuestions[currentQuizIndex];
            const feedbackEl = document.getElementById('quiz-feedback');
            const emojiEl = document.getElementById('emoji-feedback');
            
            document.querySelectorAll('.option-btn').forEach(btn => btn.disabled = true);

            if (selectedIndex === currentQ.correctIndex) {
                feedbackEl.innerHTML = "צדקת! קבל מטבע! 🪙";
                feedbackEl.style.color = "#7CFC00";
                emojiEl.innerText = "🧽🤩"; // בובספוג שמח
                coins++;
                updateCoinDisplays();
                setTimeout(nextQuizQuestion, 2000);
            } else {
                feedbackEl.innerHTML = `טעות. התשובה היא: ${currentQ.options[currentQ.correctIndex]}`;
                feedbackEl.style.color = "#FF6347";
                emojiEl.innerText = "🧽😭"; // בובספוג עצוב
                setTimeout(nextQuizQuestion, 3500);
            }
            emojiEl.style.display = 'block';
        }

        function nextQuizQuestion() {
            currentQuizIndex++;
            displayQuizQuestion();
        }

        function renderShopItems() {
            const container = document.getElementById('shop-items');
            container.innerHTML = '';
            
            shopItemsData.forEach(item => {
                const el = document.createElement('div');
                el.className = 'shop-item';
                const isOwned = ownedItems.includes(item.id);
                
                let actionArea = isOwned ? 
                    `<div class="owned-badge">✓ קנוי</div>` : 
                    `<p>מחיר: ${item.price} 🪙</p><button onclick="buyItem(${item.id})">קנה</button>`;
                
                el.innerHTML = `
                    <div class="shop-emoji">${item.emoji}</div>
                    <h3>${item.name}</h3>
                    ${actionArea}
                `;
                container.appendChild(el);
            });
        }

        function buyItem(itemId) {
            const item = shopItemsData.find(i => i.id === itemId);
            if (coins >= item.price) {
                coins -= item.price;
                ownedItems.push(itemId);
                updateCoinDisplays();
                renderShopItems();
            } else {
                alert(`חסרים לך עוד ${item.price - coins} מטבעות!`);
            }
        }
    </script>
</body>
</html>
